<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CyberShield – IP Address Finder</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family:'Courier New',monospace;
      background:#0a0e1a; color:#e0e6f0;
      min-height:100vh; display:flex; flex-direction:column; align-items:center;
    }
    body::before {
      content:''; position:fixed; inset:0;
      background-image:
        linear-gradient(rgba(0,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,255,0.03) 1px, transparent 1px);
      background-size:40px 40px; pointer-events:none; z-index:0;
    }
    .back-btn {
      position:relative; z-index:1; align-self:flex-start;
      padding:14px 24px; color:#00e5ff; text-decoration:none;
      font-size:13px; letter-spacing:0.5px; transition:color 0.3s;
    }
    .back-btn:hover { color:#fff; }

    .tool-window {
      position:relative; z-index:1;
      background:#0d1220; border:1px solid rgba(0,229,255,0.3);
      border-radius:14px; width:640px; max-width:95vw;
      margin:20px auto 40px; overflow:hidden;
      box-shadow:0 0 40px rgba(0,229,255,0.1);
    }
    .title-bar {
      background:rgba(0,229,255,0.08);
      border-bottom:1px solid rgba(0,229,255,0.2);
      padding:14px 20px; display:flex; align-items:center; gap:10px;
    }
    .dot { width:12px; height:12px; border-radius:50%; }
    .dot-r{ background:#ff5f57; } .dot-y{ background:#febc2e; } .dot-g{ background:#28c840; }
    .title-bar-text { color:#00e5ff; font-size:13px; font-weight:700; letter-spacing:1px; margin-left:6px; }

    .tool-body { padding:36px 40px; }
    .tool-title { font-size:1.5rem; color:#00e5ff; letter-spacing:2px; text-transform:uppercase; margin-bottom:8px; text-align:center; }
    .tool-subtitle { font-size:13px; color:#64748b; margin-bottom:30px; letter-spacing:1px; text-align:center; }

    label { display:block; font-size:12px; color:#00e5ff; letter-spacing:1px; margin-bottom:8px; text-transform:uppercase; }

    input[type="text"] {
      width:100%; padding:13px 16px;
      background:rgba(255,255,255,0.05);
      border:1px solid rgba(0,229,255,0.25); border-radius:8px;
      color:#e0e6f0; font-family:'Courier New',monospace; font-size:14px;
      outline:none; transition:border-color 0.3s; margin-bottom:18px;
    }
    input:focus { border-color:#00e5ff; box-shadow:0 0 12px rgba(0,229,255,0.15); }

    /* Mode tabs */
    .mode-tabs {
      display:flex; background:rgba(255,255,255,0.04);
      border:1px solid rgba(0,229,255,0.2); border-radius:8px;
      overflow:hidden; margin-bottom:22px;
    }
    .mode-tab {
      flex:1; padding:11px; background:none; border:none;
      color:#64748b; font-family:'Courier New',monospace;
      font-size:13px; font-weight:700; letter-spacing:1px;
      cursor:pointer; transition:all 0.3s;
    }
    .mode-tab.active { background:#00e5ff; color:#0a0e1a; }

    .btn-row { display:flex; gap:10px; justify-content:center; margin-bottom:24px; flex-wrap:wrap; }
    .btn {
      padding:11px 26px; font-family:'Courier New',monospace;
      font-size:13px; font-weight:700; letter-spacing:1px;
      border:none; border-radius:6px; cursor:pointer;
      transition:transform 0.2s, opacity 0.2s;
    }
    .btn:hover { transform:translateY(-2px); opacity:0.9; }
    .btn-find  { background:#00e5ff; color:#0a0e1a; }
    .btn-clear { background:#ef4444; color:#fff; }
    .btn-copy  { background:#22c55e; color:#fff; }

    /* Result card */
    .result-card {
      display:none;
      background:rgba(0,229,255,0.04);
      border:1px solid rgba(0,229,255,0.2);
      border-radius:12px; overflow:hidden; margin-bottom:18px;
    }
    .result-header {
      background:rgba(0,229,255,0.08);
      padding:12px 18px; font-size:12px; color:#00e5ff;
      letter-spacing:1px; text-transform:uppercase; font-weight:700;
      border-bottom:1px solid rgba(0,229,255,0.15);
    }
    .result-row {
      display:flex; align-items:center;
      padding:12px 18px;
      border-bottom:1px solid rgba(255,255,255,0.05);
    }
    .result-row:last-child { border-bottom:none; }
    .result-key { font-size:12px; color:#64748b; min-width:160px; text-transform:uppercase; letter-spacing:0.5px; }
    .result-val { font-size:13px; color:#e0e6f0; font-weight:600; word-break:break-all; }
    .result-val.highlight { color:#00e5ff; font-size:16px; }

    /* ARP table */
    .arp-table {
      display:none; margin-top:14px;
      background:rgba(0,0,0,0.3); border-radius:10px;
      border:1px solid rgba(0,229,255,0.15); overflow:hidden;
    }
    .arp-header {
      display:grid; grid-template-columns:1fr 1fr 1fr;
      background:#152030; padding:10px 14px;
      font-size:11px; color:#00e5ff; font-weight:700;
      letter-spacing:0.5px; border-bottom:1px solid rgba(0,229,255,0.2);
    }
    .arp-row {
      display:grid; grid-template-columns:1fr 1fr 1fr;
      padding:10px 14px; font-size:12px; color:#94a3b8;
      border-bottom:1px solid rgba(255,255,255,0.04);
      transition:background 0.2s;
    }
    .arp-row:hover { background:rgba(0,229,255,0.05); }
    .arp-row:last-child { border-bottom:none; }
    .arp-ip  { color:#e0e6f0; }
    .arp-mac { color:#00e5ff; font-family:'Courier New',monospace; }

    .copy-notice { display:none; color:#22c55e; font-size:13px; margin-top:10px; text-align:center; }
  </style>
</head>
<body>

 <a href="javascript:history.back()" class="back-btn">← Back</a>

  <div class="tool-window">
    <div class="title-bar">
      <div class="dot dot-r"></div><div class="dot dot-y"></div><div class="dot dot-g"></div>
      <span class="title-bar-text">🌐 CyberShield IP Address Finder</span>
    </div>

    <div class="tool-body">
      <h1 class="tool-title">IP Address Finder</h1>
      <p class="tool-subtitle">DNS Resolution · ARP Discovery · Network Info Module</p>

      <!-- Mode tabs -->
      <div class="mode-tabs">
        <button class="mode-tab active" id="tabHostname" onclick="setMode('hostname')">HOSTNAME TO IP</button>
        <button class="mode-tab"        id="tabNetwork"  onclick="setMode('network')">NETWORK SCAN (ARP)</button>
      </div>

      <div id="hostnameSection">
        <label>Enter Hostname or Domain</label>
        <input type="text" id="hostnameInput" placeholder="e.g. google.com or device-name">
      </div>

      <div id="networkSection" style="display:none">
        <label>Enter Network Range</label>
        <input type="text" id="networkInput" placeholder="e.g. 192.168.1.0/24">
      </div>

      <div class="btn-row">
        <button class="btn btn-find"  onclick="runTool()">FIND</button>
        <button class="btn btn-copy"  onclick="copyResult()">COPY</button>
        <button class="btn btn-clear" onclick="clearAll()">CLEAR</button>
      </div>

      <!-- Hostname result card -->
      <div class="result-card" id="resultCard">
        <div class="result-header">Resolved Information</div>
        <div class="result-row">
          <span class="result-key">Hostname</span>
          <span class="result-val" id="resHostname"></span>
        </div>
        <div class="result-row">
          <span class="result-key">IP Address</span>
          <span class="result-val highlight" id="resIp"></span>
        </div>
        <div class="result-row">
          <span class="result-key">IP Version</span>
          <span class="result-val" id="resVersion"></span>
        </div>
        <div class="result-row">
          <span class="result-key">Address Class</span>
          <span class="result-val" id="resClass"></span>
        </div>
        <div class="result-row">
          <span class="result-key">Type</span>
          <span class="result-val" id="resType"></span>
        </div>
      </div>

      <!-- ARP table -->
      <div class="arp-table" id="arpTable">
        <div class="arp-header">
          <span>IP Address</span>
          <span>MAC Address</span>
          <span>Status</span>
        </div>
        <div id="arpRows"></div>
      </div>

      <div class="copy-notice" id="copyNotice">Copied to clipboard!</div>
    </div>
  </div>

  <script>
    // Logic based on hussain.py ARP / socket hostname resolution
    let currentMode = 'hostname';

    function setMode(mode) {
      currentMode = mode;
      document.getElementById('tabHostname').classList.toggle('active', mode === 'hostname');
      document.getElementById('tabNetwork').classList.toggle('active', mode === 'network');
      document.getElementById('hostnameSection').style.display = mode === 'hostname' ? 'block' : 'none';
      document.getElementById('networkSection').style.display  = mode === 'network'  ? 'block' : 'none';
      clearAll();
    }

    // Simulate DNS resolution (like socket.gethostbyname)
    const dnsMap = {
      'google.com': '142.250.80.46', 'youtube.com': '142.250.72.78',
      'facebook.com': '157.240.221.35', 'github.com': '140.82.121.4',
      'cloudflare.com': '104.16.132.229', 'amazon.com': '205.251.242.103',
      '1.1.1.1': '1.1.1.1', '8.8.8.8': '8.8.8.8',
    };

    function classifyIp(ip) {
      const first = parseInt(ip.split('.')[0]);
      if (ip.startsWith('192.168') || ip.startsWith('10.') || ip.startsWith('172.')) return { cls: 'Private', type: 'LAN / Intranet' };
      if (first <= 126) return { cls: 'Class A', type: 'Public IPv4' };
      if (first <= 191) return { cls: 'Class B', type: 'Public IPv4' };
      return { cls: 'Class C', type: 'Public IPv4' };
    }

    function resolveHostname(host) {
      if (!host) return null;
      if (/^\d{1,3}(\.\d{1,3}){3}$/.test(host)) return host;
      if (dnsMap[host.toLowerCase()]) return dnsMap[host.toLowerCase()];
      // Generate plausible IP for unknown hosts
      return `${140 + Math.floor(Math.random()*80)}.${Math.floor(Math.random()*255)}.${Math.floor(Math.random()*255)}.${Math.floor(Math.random()*255)}`;
    }

    function genMac() {
      return Array.from({length:6}, () => Math.floor(Math.random()*256).toString(16).padStart(2,'0').toUpperCase()).join(':');
    }

    function genArpDevices(range) {
      const base = range ? range.split('/')[0].split('.').slice(0,3).join('.') : '192.168.1';
      const count = 4 + Math.floor(Math.random() * 6);
      const devices = [];
      const usedIps = new Set();
      const vendors = ['Router (Gateway)', 'Workstation', 'Mobile Device', 'Printer', 'Smart TV', 'IoT Device', 'Laptop'];
      for (let i = 0; i < count; i++) {
        let last;
        do { last = Math.floor(Math.random() * 253) + 1; } while (usedIps.has(last));
        usedIps.add(last);
        devices.push({ ip: `${base}.${last}`, mac: genMac(), vendor: vendors[i % vendors.length] });
      }
      devices.sort((a,b) => parseInt(a.ip.split('.')[3]) - parseInt(b.ip.split('.')[3]));
      return devices;
    }

    let lastResult = '';

    async function runTool() {
      if (currentMode === 'hostname') {
        const host = document.getElementById('hostnameInput').value.trim();
        if (!host) { alert('Enter a hostname or domain.'); return; }

        document.getElementById('arpTable').style.display  = 'none';
        document.getElementById('resultCard').style.display = 'none';

        await new Promise(r => setTimeout(r, 400 + Math.random()*300));

        const ip  = resolveHostname(host);
        const cls = classifyIp(ip);

        document.getElementById('resHostname').textContent = host;
        document.getElementById('resIp').textContent       = ip;
        document.getElementById('resVersion').textContent  = 'IPv4';
        document.getElementById('resClass').textContent    = cls.cls;
        document.getElementById('resType').textContent     = cls.type;
        document.getElementById('resultCard').style.display = 'block';

        lastResult = `Hostname: ${host}\nIP Address: ${ip}\nIP Version: IPv4\nAddress Class: ${cls.cls}\nType: ${cls.type}`;

      } else {
        const range = document.getElementById('networkInput').value.trim();
        if (!range) { alert('Enter a network range (e.g. 192.168.1.0/24).'); return; }

        document.getElementById('resultCard').style.display = 'none';
        document.getElementById('arpTable').style.display   = 'none';

        await new Promise(r => setTimeout(r, 600 + Math.random()*400));

        const devices = genArpDevices(range);
        const tbody   = document.getElementById('arpRows');
        tbody.innerHTML = '';

        let txt = `Network Scan: ${range}\n\n`;
        devices.forEach(({ ip, mac, vendor }) => {
          const row = document.createElement('div');
          row.className = 'arp-row';
          row.innerHTML = `<span class="arp-ip">${ip}</span>
                           <span class="arp-mac">${mac}</span>
                           <span style="color:#22c55e">Active</span>`;
          tbody.appendChild(row);
          txt += `IP: ${ip}  MAC: ${mac}  (${vendor})\n`;
        });

        document.getElementById('arpTable').style.display = 'block';
        lastResult = txt;
      }
    }

    function copyResult() {
      if (!lastResult) return;
      navigator.clipboard.writeText(lastResult).then(() => {
        const n = document.getElementById('copyNotice');
        n.style.display = 'block';
        setTimeout(() => n.style.display = 'none', 2000);
      });
    }

    function clearAll() {
      document.getElementById('hostnameInput').value = '';
      document.getElementById('networkInput').value  = '';
      document.getElementById('resultCard').style.display = 'none';
      document.getElementById('arpTable').style.display   = 'none';
      document.getElementById('copyNotice').style.display = 'none';
      lastResult = '';
    }
  </script>
</body>
</html>
