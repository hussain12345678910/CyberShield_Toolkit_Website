{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SecurePanel | Register</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif}
    body{min-height:100vh;display:flex;justify-content:center;align-items:center;background:#050505;overflow:hidden;position:relative;padding-top:90px}
    body::before{content:'';position:absolute;width:100%;height:100%;background:linear-gradient(rgba(0,255,255,.08) 1px,transparent 1px),linear-gradient(90deg,rgba(0,255,255,.08) 1px,transparent 1px);background-size:50px 50px;animation:gridMove 20s linear infinite}
    @keyframes gridMove{from{transform:translateY(0)}to{transform:translateY(50px)}}
    .glow1,.glow2{position:absolute;border-radius:50%;filter:blur(120px)}
    .glow1{width:320px;height:320px;background:#00ffff;top:-100px;left:-100px}
    .glow2{width:320px;height:320px;background:#008cff;bottom:-120px;right:-120px}
    nav{position:fixed;top:0;left:0;width:100%;padding:20px 8%;display:flex;justify-content:space-between;align-items:center;background:rgba(10,10,10,.85);backdrop-filter:blur(15px);border-bottom:1px solid rgba(0,255,255,.2);z-index:999}
    .logo{font-size:30px;font-weight:bold;color:white;letter-spacing:2px}
    .logo span{color:#00ffff;text-shadow:0 0 15px #00ffff}
    .nav-right{display:flex;gap:10px}
    .nav-btn{text-decoration:none;padding:10px 18px;border-radius:8px;font-weight:600;transition:.3s}
    .login-btn{color:#00ffff;border:1px solid #00ffff}
    .login-btn:hover{background:#00ffff;color:black;box-shadow:0 0 15px #00ffff}
    .back-btn{color:#aaa;border:1px solid #333}
    .back-btn:hover{color:white;background:#111}
    .register-box{width:430px;background:rgba(10,10,10,.75);backdrop-filter:blur(25px);border:1px solid rgba(0,255,255,.2);border-radius:25px;padding:45px;z-index:10;box-shadow:0 0 30px rgba(0,255,255,.15)}
    .register-box h2{text-align:center;color:#00ffff;margin-bottom:10px;font-size:38px;text-shadow:0 0 15px #00ffff}
    .subtitle{text-align:center;color:#888;margin-bottom:30px}
    .alert-msg{background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);color:#ef4444;padding:10px 15px;border-radius:10px;margin-bottom:20px;text-align:center;font-size:.9rem}
    .input-box{position:relative;margin-bottom:18px}
    .input-box i{position:absolute;left:15px;top:17px;color:#00ffff}
    .input-box input{width:100%;padding:14px 15px 14px 45px;background:#0f0f0f;border:1px solid #222;border-radius:10px;color:white;outline:none;transition:.3s}
    .input-box input:focus{border-color:#00ffff;box-shadow:0 0 15px rgba(0,255,255,.3)}
    .register-btn{width:100%;padding:15px;border:none;border-radius:10px;background:#00ffff;color:black;font-weight:bold;cursor:pointer;transition:.4s;margin-top:10px}
    .register-btn:hover{box-shadow:0 0 25px #00ffff;transform:translateY(-2px)}
    .bottom-text{text-align:center;margin-top:20px;color:#999}
    .bottom-text a{color:#00ffff;text-decoration:none}
    @media(max-width:500px){.register-box{width:92%;padding:30px}.register-box h2{font-size:30px}}
  </style>
</head>
<body>
  <div class="glow1"></div>
  <div class="glow2"></div>
  <nav>
    <div class="logo">Secure<span>Panel</span></div>
    <div class="nav-right">
      <a href="javascript:history.back()" class="nav-btn back-btn"><i class="fa-solid fa-arrow-left"></i> Go Back</a>
      <a href="{% url 'login' %}" class="nav-btn login-btn">Login</a>
    </div>
  </nav>
  <div class="register-box">
    <h2>REGISTER</h2>
    <p class="subtitle">Create Secure Account</p>
    {% if messages %}
      {% for msg in messages %}<div class="alert-msg">{{ msg }}</div>{% endfor %}
    {% endif %}
    <form method="post" action="{% url 'register' %}">
      {% csrf_token %}
      <div class="input-box"><i class="fa-solid fa-user"></i><input type="text" name="username" placeholder="Full Name" required></div>
      <div class="input-box"><i class="fa-solid fa-envelope"></i><input type="email" name="email" placeholder="Email Address" required></div>
      <div class="input-box"><i class="fa-solid fa-lock"></i><input type="password" name="password" placeholder="Create Password" required></div>
      <button type="submit" class="register-btn"><i class="fa-solid fa-shield-halved"></i> Create Account</button>
    </form>
    <div class="bottom-text">Already have an account? <a href="{% url 'login' %}">Login</a></div>
  </div>
</body>
</html>
