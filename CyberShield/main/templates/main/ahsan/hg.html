<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CyberShield – Hash Generator</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'Courier New', monospace;
      background: #0a0e1a;
      color: #e0e6f0;
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center;
    }

    body::before {
      content:''; position:fixed; inset:0;
      background-image:
        linear-gradient(rgba(0,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,255,0.03) 1px, transparent 1px);
      background-size:40px 40px; pointer-events:none; z-index:0;
    }

    .back-btn {
      position:relative; z-index:1; align-self:flex-start;
      padding:14px 24px; color:#00e5ff; text-decoration:none;
      font-size:13px; letter-spacing:0.5px; transition:color 0.3s;
    }
    .back-btn:hover { color:#fff; }

    .tool-window {
      position:relative; z-index:1;
      background:#0d1220;
      border:1px solid rgba(0,229,255,0.3);
      border-radius:14px; width:620px; max-width:95vw;
      margin:20px auto 40px; overflow:hidden;
      box-shadow:0 0 40px rgba(0,229,255,0.1);
    }

    .title-bar {
      background:rgba(0,229,255,0.08);
      border-bottom:1px solid rgba(0,229,255,0.2);
      padding:14px 20px; display:flex; align-items:center; gap:10px;
    }
    .title-bar-dot { width:12px; height:12px; border-radius:50%; }
    .dot-red   { background:#ff5f57; }
    .dot-yellow{ background:#febc2e; }
    .dot-green { background:#28c840; }
    .title-bar-text { color:#00e5ff; font-size:13px; font-weight:700; letter-spacing:1px; margin-left:6px; }

    .tool-body { padding:36px 40px; text-align:center; }
    .tool-title { font-size:1.5rem; color:#00e5ff; letter-spacing:2px; text-transform:uppercase; margin-bottom:8px; }
    .tool-subtitle { font-size:13px; color:#64748b; margin-bottom:30px; letter-spacing:1px; }

    label {
      display:block; font-size:12px; color:#00e5ff;
      letter-spacing:1px; margin-bottom:8px; text-transform:uppercase; text-align:left;
    }

    textarea {
      width:100%; padding:14px 16px;
      background:rgba(255,255,255,0.05);
      border:1px solid rgba(0,229,255,0.25);
      border-radius:8px; color:#e0e6f0;
      font-family:'Courier New',monospace; font-size:14px;
      outline:none; resize:vertical; min-height:80px;
      transition:border-color 0.3s; margin-bottom:20px;
    }
    textarea:focus { border-color:#00e5ff; box-shadow:0 0 12px rgba(0,229,255,0.15); }

    /* Hash type selector */
    .hash-selector {
      display:flex; gap:14px; margin-bottom:22px;
    }

    .hash-opt {
      flex:1; padding:12px;
      background:rgba(255,255,255,0.04);
      border:2px solid rgba(0,229,255,0.2);
      border-radius:10px; cursor:pointer;
      text-align:center; transition:all 0.3s;
    }
    .hash-opt:hover { border-color:#00e5ff; }
    .hash-opt.selected {
      background:rgba(0,229,255,0.1);
      border-color:#00e5ff;
      box-shadow:0 0 14px rgba(0,229,255,0.2);
    }
    .hash-opt-name { font-size:15px; font-weight:700; color:#00e5ff; display:block; margin-bottom:4px; }
    .hash-opt-desc { font-size:11px; color:#64748b; }

    .btn-row { display:flex; gap:10px; justify-content:center; margin-bottom:24px; flex-wrap:wrap; }
    .btn {
      padding:11px 26px; font-family:'Courier New',monospace;
      font-size:13px; font-weight:700; letter-spacing:1px;
      border:none; border-radius:6px; cursor:pointer;
      transition:transform 0.2s, opacity 0.2s;
    }
    .btn:hover { transform:translateY(-2px); opacity:0.9; }
    .btn-gen   { background:#00e5ff; color:#0a0e1a; }
    .btn-both  { background:#a855f7; color:#fff; }
    .btn-copy  { background:#22c55e; color:#fff; }
    .btn-clear { background:#ef4444; color:#fff; }

    /* Output area */
    .output-section { display:none; text-align:left; }

    .hash-result {
      background:rgba(0,229,255,0.04);
      border:1px solid rgba(0,229,255,0.18);
      border-radius:10px; padding:16px 18px;
      margin-bottom:14px;
    }
    .hash-result-label {
      font-size:11px; color:#00e5ff; letter-spacing:1px;
      text-transform:uppercase; margin-bottom:8px; display:flex; align-items:center; gap:8px;
    }
    .hash-result-label .badge {
      background:#00e5ff; color:#0a0e1a;
      font-size:10px; padding:2px 8px; border-radius:4px; font-weight:700;
    }
    .hash-value {
      font-size:12px; color:#e0e6f0;
      word-break:break-all; line-height:1.6;
      font-family:'Courier New',monospace;
    }

    .copy-row {
      display:flex; justify-content:flex-end; margin-top:10px;
    }
    .copy-small {
      background:none; border:1px solid rgba(0,229,255,0.3);
      color:#00e5ff; font-size:11px; padding:5px 12px;
      border-radius:5px; cursor:pointer; font-family:'Courier New',monospace;
      transition:background 0.3s;
    }
    .copy-small:hover { background:rgba(0,229,255,0.1); }

    .copy-notice { display:none; color:#22c55e; font-size:13px; margin-top:10px; text-align:center; }
  </style>
</head>
<body>
<a href="javascript:history.back()" class="back-btn">← Back</a>

  <div class="tool-window">
    <div class="title-bar">
      <div class="title-bar-dot dot-red"></div>
      <div class="title-bar-dot dot-yellow"></div>
      <div class="title-bar-dot dot-green"></div>
      <span class="title-bar-text">🧮 CyberShield Hash Generator</span>
    </div>

    <div class="tool-body">
      <h1 class="tool-title">Hash Generator</h1>
      <p class="tool-subtitle">MD5 · SHA-256 · Cryptographic Hash Module</p>

      <!-- Input -->
      <label>Enter Text or Password</label>
      <textarea id="inputText" placeholder="Enter text to hash…"></textarea>

      <!-- Hash type selector -->
      <label>Select Hash Algorithm</label>
      <div class="hash-selector">
        <div class="hash-opt selected" id="optMd5" onclick="selectHash('md5')">
          <span class="hash-opt-name">MD5</span>
          <span class="hash-opt-desc">128-bit · Fast · Legacy</span>
        </div>
        <div class="hash-opt" id="optSha" onclick="selectHash('sha256')">
          <span class="hash-opt-name">SHA-256</span>
          <span class="hash-opt-desc">256-bit · Secure · Modern</span>
        </div>
        <div class="hash-opt" id="optBoth" onclick="selectHash('both')">
          <span class="hash-opt-name">BOTH</span>
          <span class="hash-opt-desc">Generate both at once</span>
        </div>
      </div>

      <!-- Buttons -->
      <div class="btn-row">
        <button class="btn btn-gen"   onclick="generateHash()">GENERATE</button>
        <button class="btn btn-clear" onclick="clearAll()">CLEAR</button>
      </div>

      <!-- Output -->
      <div class="output-section" id="outputSection">

        <div class="hash-result" id="md5Result" style="display:none">
          <div class="hash-result-label">
            <span class="badge">MD5</span> MD5 Hash (128-bit)
          </div>
          <div class="hash-value" id="md5Value"></div>
          <div class="copy-row">
            <button class="copy-small" onclick="copyHash('md5Value')">Copy</button>
          </div>
        </div>

        <div class="hash-result" id="shaResult" style="display:none">
          <div class="hash-result-label">
            <span class="badge" style="background:#a855f7; color:#fff;">SHA-256</span> SHA-256 Hash (256-bit)
          </div>
          <div class="hash-value" id="shaValue"></div>
          <div class="copy-row">
            <button class="copy-small" onclick="copyHash('shaValue')">Copy</button>
          </div>
        </div>

      </div>

      <div class="copy-notice" id="copyNotice">✔ Copied to clipboard!</div>
    </div>
  </div>

  <script>
    // ── HASH LOGIC using Web Crypto API (equivalent to hashlib) ──

    let selectedType = 'md5';

    function selectHash(type) {
      selectedType = type;
      ['md5','sha256','both'].forEach(t => {
        document.getElementById('opt' + (t === 'sha256' ? 'Sha' : t.charAt(0).toUpperCase() + t.slice(1)))
          .classList.toggle('selected', t === type);
      });
    }

    // MD5 — pure JS implementation (matching Python's hashlib.md5)
    function md5(str) {
      function safeAdd(x, y) {
        const lsw = (x & 0xffff) + (y & 0xffff);
        return (((x >> 16) + (y >> 16) + (lsw >> 16)) << 16) | (lsw & 0xffff);
      }
      function bitRotateLeft(num, cnt) { return (num << cnt) | (num >>> (32 - cnt)); }
      function md5cmn(q, a, b, x, s, t) { return safeAdd(bitRotateLeft(safeAdd(safeAdd(a, q), safeAdd(x, t)), s), b); }
      function md5ff(a,b,c,d,x,s,t){ return md5cmn((b&c)|((~b)&d),a,b,x,s,t); }
      function md5gg(a,b,c,d,x,s,t){ return md5cmn((b&d)|(c&(~d)),a,b,x,s,t); }
      function md5hh(a,b,c,d,x,s,t){ return md5cmn(b^c^d,a,b,x,s,t); }
      function md5ii(a,b,c,d,x,s,t){ return md5cmn(c^(b|(~d)),a,b,x,s,t); }
      function csr(str) {
        const m=[];
        for(let i=0;i<str.length*8;i+=8) m[i>>5]|=(str.charCodeAt(i/8)&0xff)<<(i%32);
        return m;
      }
      const x=csr(str);
      x[str.length>>2]|=0x80<<((str.length%4)*8);
      x[(((str.length+8)>>6)<<4)+14]=str.length*8;
      let [a,b,c,d]=[1732584193,-271733879,-1732584194,271733878];
      for(let i=0;i<x.length;i+=16){
        let [oa,ob,oc,od]=[a,b,c,d];
        a=md5ff(a,b,c,d,x[i+0],7,-680876936);d=md5ff(d,a,b,c,x[i+1],12,-389564586);c=md5ff(c,d,a,b,x[i+2],17,606105819);b=md5ff(b,c,d,a,x[i+3],22,-1044525330);
        a=md5ff(a,b,c,d,x[i+4],7,-176418897);d=md5ff(d,a,b,c,x[i+5],12,1200080426);c=md5ff(c,d,a,b,x[i+6],17,-1473231341);b=md5ff(b,c,d,a,x[i+7],22,-45705983);
        a=md5ff(a,b,c,d,x[i+8],7,1770035416);d=md5ff(d,a,b,c,x[i+9],12,-1958414417);c=md5ff(c,d,a,b,x[i+10],17,-42063);b=md5ff(b,c,d,a,x[i+11],22,-1990404162);
        a=md5ff(a,b,c,d,x[i+12],7,1804603682);d=md5ff(d,a,b,c,x[i+13],12,-40341101);c=md5ff(c,d,a,b,x[i+14],17,-1502002290);b=md5ff(b,c,d,a,x[i+15],22,1236535329);
        a=md5gg(a,b,c,d,x[i+1],5,-165796510);d=md5gg(d,a,b,c,x[i+6],9,-1069501632);c=md5gg(c,d,a,b,x[i+11],14,643717713);b=md5gg(b,c,d,a,x[i+0],20,-373897302);
        a=md5gg(a,b,c,d,x[i+5],5,-701558691);d=md5gg(d,a,b,c,x[i+10],9,38016083);c=md5gg(c,d,a,b,x[i+15],14,-660478335);b=md5gg(b,c,d,a,x[i+4],20,-405537848);
        a=md5gg(a,b,c,d,x[i+9],5,568446438);d=md5gg(d,a,b,c,x[i+14],9,-1019803690);c=md5gg(c,d,a,b,x[i+3],14,-187363961);b=md5gg(b,c,d,a,x[i+8],20,1163531501);
        a=md5gg(a,b,c,d,x[i+13],5,-1444681467);d=md5gg(d,a,b,c,x[i+2],9,-51403784);c=md5gg(c,d,a,b,x[i+7],14,1735328473);b=md5gg(b,c,d,a,x[i+12],20,-1926607734);
        a=md5hh(a,b,c,d,x[i+5],4,-378558);d=md5hh(d,a,b,c,x[i+8],11,-2022574463);c=md5hh(c,d,a,b,x[i+11],16,1839030562);b=md5hh(b,c,d,a,x[i+14],23,-35309556);
        a=md5hh(a,b,c,d,x[i+1],4,-1530992060);d=md5hh(d,a,b,c,x[i+4],11,1272893353);c=md5hh(c,d,a,b,x[i+7],16,-155497632);b=md5hh(b,c,d,a,x[i+10],23,-1094730640);
        a=md5hh(a,b,c,d,x[i+13],4,681279174);d=md5hh(d,a,b,c,x[i+0],11,-358537222);c=md5hh(c,d,a,b,x[i+3],16,-722521979);b=md5hh(b,c,d,a,x[i+6],23,76029189);
        a=md5hh(a,b,c,d,x[i+9],4,-640364487);d=md5hh(d,a,b,c,x[i+12],11,-421815835);c=md5hh(c,d,a,b,x[i+15],16,530742520);b=md5hh(b,c,d,a,x[i+2],23,-995338651);
        a=md5ii(a,b,c,d,x[i+0],6,-198630844);d=md5ii(d,a,b,c,x[i+7],10,1126891415);c=md5ii(c,d,a,b,x[i+14],15,-1416354905);b=md5ii(b,c,d,a,x[i+5],21,-57434055);
        a=md5ii(a,b,c,d,x[i+12],6,1700485571);d=md5ii(d,a,b,c,x[i+3],10,-1894986606);c=md5ii(c,d,a,b,x[i+10],15,-1051523);b=md5ii(b,c,d,a,x[i+1],21,-2054922799);
        a=md5ii(a,b,c,d,x[i+8],6,1873313359);d=md5ii(d,a,b,c,x[i+15],10,-30611744);c=md5ii(c,d,a,b,x[i+6],15,-1560198380);b=md5ii(b,c,d,a,x[i+13],21,1309151649);
        a=md5ii(a,b,c,d,x[i+4],6,-145523070);d=md5ii(d,a,b,c,x[i+11],10,-1120210379);c=md5ii(c,d,a,b,x[i+2],15,718787259);b=md5ii(b,c,d,a,x[i+9],21,-343485551);
        a=safeAdd(a,oa);b=safeAdd(b,ob);c=safeAdd(c,oc);d=safeAdd(d,od);
      }
      return [a,b,c,d].map(n=>(n<0?n+4294967296:n).toString(16).padStart(8,'0').match(/../g).reverse().join('')).join('');
    }

    // SHA-256 using Web Crypto API
    async function sha256(str) {
      const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
      return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
    }

    async function generateHash() {
      const text = document.getElementById('inputText').value;
      if (!text.trim()) return;

      const section = document.getElementById('outputSection');
      const md5Div  = document.getElementById('md5Result');
      const shaDiv  = document.getElementById('shaResult');

      section.style.display = 'block';

      if (selectedType === 'md5' || selectedType === 'both') {
        document.getElementById('md5Value').textContent = md5(text);
        md5Div.style.display = 'block';
      } else { md5Div.style.display = 'none'; }

      if (selectedType === 'sha256' || selectedType === 'both') {
        document.getElementById('shaValue').textContent = await sha256(text);
        shaDiv.style.display = 'block';
      } else { shaDiv.style.display = 'none'; }
    }

    function copyHash(id) {
      const val = document.getElementById(id).textContent;
      navigator.clipboard.writeText(val).then(() => {
        const n = document.getElementById('copyNotice');
        n.style.display = 'block';
        setTimeout(() => n.style.display = 'none', 2000);
      });
    }

    function clearAll() {
      document.getElementById('inputText').value = '';
      document.getElementById('outputSection').style.display = 'none';
      document.getElementById('md5Result').style.display = 'none';
      document.getElementById('shaResult').style.display = 'none';
      document.getElementById('copyNotice').style.display = 'none';
    }
  </script>

</body>
</html>
